name: Simple CI pipeline
on:
    push:
       branches: [ "main" ]
    pull_request:
       branches: [ "main" ]

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
          contents: read
          packages: write  

        steps:
          - name: Checkout repository
            uses: actions/checkout@v3

          - name: step1
            run: echo "This is my step1 pipeline run"

          - name: step2
            run: echo "This is my step2 pipeline run"

          - name: breaking pipeline
            run: echo "pipeline fixed"
          
          - name: Build docker image
            run: docker build -t devops .
          
          - name: Login to GHCR
            run: echo "${{secrets.GHCR_TOKEN}}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          - name: Build a Docker image
            run: docker build -t ghcr.io/${{ github.actor }}/mydoc:v1 .

          - name: Push a docker image
            run: docker push ghcr.io/${{ github.actor }}/mydoc:v1


            
